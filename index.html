<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balance Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-6 font-sans">

    <div class="max-w-3xl mx-auto space-y-6">
        
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Balance Tracker</h1>
                <p class="text-slate-500 text-sm">Optimize your cellular health</p>
            </div>
            <button class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium shadow-sm transition-colors text-sm">
                Upgrade to Premium
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between">
                <div>
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Cellular Shield</h2>
                    
                    <div class="flex items-center justify-between mb-2 text-sm">
                        <span class="text-green-600 font-medium">Antioxidants</span>
                        <span class="text-red-500 font-medium">Oxidants</span>
                    </div>
                    
                    <div class="w-full bg-red-100 rounded-full h-4 flex overflow-hidden mb-4">
                        <div id="progress-bar" class="bg-green-500 h-4 transition-all duration-700 ease-out" style="width: 50%"></div>
                    </div>
                </div>

                <div class="mt-2 border-t border-slate-50 pt-4">
                    <p class="text-xs text-slate-500 mb-1">Current State</p>
                    <p id="shield-status" class="text-xl font-bold text-slate-700">Awaiting Data...</p>
                    <p id="net-status" class="text-sm font-medium mt-1 text-slate-400">Net: 0 Units</p>
                </div>
            </section>

            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Gut Diversity (Weekly)</h2>
                
                <div class="flex items-end gap-2 mb-2">
                    <span id="unique-plants" class="text-4xl font-extrabold text-indigo-600">0</span>
                    <span class="text-slate-500 font-medium pb-1">/ 30 plants</span>
